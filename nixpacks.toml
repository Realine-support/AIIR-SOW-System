[phases.setup]
nixPkgs = ["python311"]
nixLibs = ["python311"]

[phases.install]
cmds = [
  "python3.11 -m venv /app/.venv",
  "source /app/.venv/bin/activate",
  "cd aiir-sow-system && pip install --no-cache-dir -r requirements.txt"
]

[phases.build]
cmds = ["echo 'Build complete'"]

[start]
cmd = "cd aiir-sow-system && /app/.venv/bin/python -m uvicorn api.index:app --host 0.0.0.0 --port ${PORT:-8000}"
